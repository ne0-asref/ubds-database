name: validate-boards

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: validate-boards-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dbf CLI
        run: pip install ./cli
      - name: Validate boards
        run: dbf validate boards/
