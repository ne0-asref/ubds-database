ubds_version: "1.0"

# ── IDENTITY & CLASSIFICATION ──────────────────────────────────────────────────

name: "Adafruit Feather M4 Express"
slug: "adafruit-feather-m4"
manufacturer: "Adafruit"
series: "Feather"
parent_board: null
hardware_version: null
status: active
release_date: "2018-08-01"
end_of_life_date: null

board_type:
  - MCU

difficulty_level: beginner
ecosystem_size: large
use_cases:
  - Wearables
  - IoT
  - Prototyping
  - Audio
  - Battery-powered devices
tags:
  - CircuitPython
  - Arduino
  - SAMD51
  - Feather
  - LiPo
  - FPU
  - QSPI


# ── PROCESSING ELEMENTS ────────────────────────────────────────────────────────

processing:
  - name: "ATSAMD51J19A"
    part_number: "ATSAMD51J19A"
    role: primary
    integrated: true
    type: mcu
    datasheet_url: "https://ww1.microchip.com/downloads/en/DeviceDoc/SAM_D5x_E5x_Family_Data_Sheet_DS60001507G.pdf"

    cpu_cores:
      - architecture: "ARM Cortex-M4F"
        bit_width: 32
        count: 1
        clock_mhz: 120
        features: [FPU, DSP, SysTick, MPU]

    memory:
      ram_kb: 192
      flash_kb: 512
      eeprom_kb: null

    security:
      hardware_crypto: true
      crypto_algorithms: [AES, SHA, RSA, ECC]
      secure_boot: null
      secure_element: null
      trustzone: null
      tamper_detection: null
      secure_storage: null


# ── PHYSICAL WIRED INTERFACES ──────────────────────────────────────────────────

interfaces:
  - connector: "USB-C"
    label: null
    classification: hybrid
    count: 1
    protocols:
      - name: "USB 2.0 Full Speed"
        speed: "12 Mbps"
        features: [USB-native, CDC-ACM, HID, MIDI, MSC]
    power:
      voltage_v: 5
      current_a: 0.5
      direction: input
    notes: "USB native via ATSAMD51 — no FTDI chip required"

  - connector: "JST-PH 2-pin"
    label: "BATTERY"
    classification: power
    count: 1
    power:
      voltage_v: 3.7
      direction: input
    notes: "LiPo battery connector; onboard MCP73831 charger at 200 mA"

  - connector: "Pin Header (pads)"
    label: "SWD"
    classification: debug
    count: 1
    protocols:
      - name: "SWD"
        voltage_v: 3.3
    notes: "Bare pads on PCB — no onboard debugger; requires external probe (e.g. J-Link, CMSIS-DAP)"


# ── PIN HEADERS ────────────────────────────────────────────────────────────────

pin_headers:
  - name: "Feather Header"
    label: null
    standard: "Feather"
    pin_count: 28
    pitch_mm: 2.54
    rows: 2

    peripherals:
      gpio: 21
      i2c: 1
      spi: 1
      uart: 1
      pwm: 16
      i2s: 1
      adc: 6
      dac: 2
      can: null

    voltage_levels:
      - voltage_v: 3.3
        standard: LVCMOS

    power_pins:
      - pin: 1
        voltage_v: 3.3
        max_current_ma: 500
        direction: output
      - pin: 2
        voltage_v: 5
        max_current_ma: 500
        direction: output


# ── WIRELESS INTERFACES ────────────────────────────────────────────────────────

wireless: []


# ── INPUTS ────────────────────────────────────────────────────────────────────

inputs:
  - type: button
    label: "RESET"
    count: 1
    function: reset


# ── OUTPUTS ───────────────────────────────────────────────────────────────────

outputs:
  - type: led
    label: "CHG"
    color: yellow
    count: 1
    function: battery_charge_indicator
    programmable: false
  - type: led
    label: "13"
    color: red
    count: 1
    function: user
    programmable: true
  - type: rgb_led
    label: "NEOPIXEL"
    count: 1
    function: user
    programmable: true
    technology: "WS2812B"
    notes: "Single NeoPixel RGB LED onboard, connected to pin 8"


# ── ON-BOARD COMPONENTS ────────────────────────────────────────────────────────

onboard_components:
  memory:
    - type: "QSPI Flash"
      part_number: "GD25Q16"
      manufacturer: "GigaDevice"
      interface: QSPI
  power_management:
    - type: battery_charger
      part_number: "MCP73831"
      manufacturer: "Microchip"
      interface: "analog"
  other:
    - type: voltage_regulator
      part_number: "AP2112K-3.3"
      manufacturer: "Diodes Inc"


# ── POWER ─────────────────────────────────────────────────────────────────────

power:
  input_voltage_min_v: 3.7
  input_voltage_max_v: 5.5
  operating_voltage_v: 3.3

  provides:
    - voltage_v: 3.3
      max_current_ma: 500

  battery:
    connector: "JST-PH"
    chemistry: [Li-Po, Li-Ion]
    charging_circuit: true
    solar_input: false

  consumption:
    - mode: active
      current_ma: 50
      notes: "Approximate at 120 MHz, no radio"
    - mode: deep_sleep
      current_ua: 6
      notes: "Approximate standby with USB disconnected"


# ── PHYSICAL / FORM FACTOR ─────────────────────────────────────────────────────

physical:
  dimensions_mm:
    length: 51
    width: 23
    height: 8
  weight_g: 5
  form_factor: ["Feather"]
  breadboard_friendly: true
  mounting_holes:
    count: 2
    pattern: "Feather standard"
    diameter_mm: 2.0
  enclosure_available: false


# ── SOFTWARE SUPPORT ───────────────────────────────────────────────────────────

software:
  languages:
    - name: C
      support_level: board
    - name: C++
      support_level: board
    - name: Python
      support_level: board
      variant: "CircuitPython"
      notes: "Full CircuitPython support; runs directly on device"
    - name: Rust
      support_level: community
      notes: "Community-maintained thumbv7em-none-eabihf target"

  frameworks:
    - name: Arduino
      support_level: board
      board_manager_url: "https://adafruit.github.io/arduino-board-index/package_adafruit_index.json"
      notes: "Adafruit SAMD Boards package"
    - name: CircuitPython
      support_level: board
      url: "https://circuitpython.org/board/feather_m4_express/"
    - name: PlatformIO
      support_level: board
      platform_id: "atmelsam"
      board_id: "adafruit_feather_m4"

  ides:
    - name: Arduino IDE
    - name: VS Code
    - name: Mu Editor

  debugger_support:
    - name: OpenOCD
      interface: SWD
    - name: J-Link
      interface: SWD
    - name: CMSIS-DAP
      interface: SWD


