ubds_version: "1.0"

# ── IDENTITY & CLASSIFICATION ─────────────────────────────────────────────────

name: "NXP i.MX RT1060 EVKB"
slug: "imx-rt1060-evkb"
manufacturer: "NXP Semiconductors"
series: "i.MX RT"
parent_board: null
hardware_version: "Rev B"
status: active
release_date: "2020-06-01"
end_of_life_date: null

board_type:
  - MCU

difficulty_level: advanced
ecosystem_size: medium
use_cases:
  - Motor Control
  - Industrial Automation
  - Consumer Electronics
  - Audio Processing
  - Real-Time Control
tags:
  - crossover-mcu
  - cortex-m7
  - flexspi
  - ethernet
  - can-fd


# ── PROCESSING ELEMENTS ───────────────────────────────────────────────────────

processing:
  - name: "i.MX RT1062"
    part_number: "MIMXRT1062DVL6B"
    role: primary
    integrated: true
    type: mcu
    datasheet_url: "https://www.nxp.com/docs/en/data-sheet/IMXRT1060CEC.pdf"

    cpu_cores:
      - architecture: "ARM Cortex-M7"
        bit_width: 32
        count: 1
        clock_mhz: 600
        features: [FPU, DSP, TrustZone, MPU]

    memory:
      ram_kb: 1024        # 1 MB SRAM on-chip (includes DTCM + ITCM + OCRAM)
      flash_kb: null      # No internal flash; boots from external HyperFlash/QSPI
      eeprom_kb: null

    security:
      secure_boot: true
      secure_element: null
      trustzone: true
      hardware_crypto: true
      crypto_algorithms: [AES-128, AES-256, SHA-256, RSA, ECC, DES, 3DES]
      tamper_detection: false
      secure_storage: true


# ── PHYSICAL WIRED INTERFACES ─────────────────────────────────────────────────

interfaces:
  - connector: "USB Micro-B"
    label: "J9"
    classification: debug
    count: 1
    protocols:
      - name: CMSIS-DAP
        voltage_v: 3.3
      - name: USB 2.0
        speed: "12 Mbps"
    notes: "Onboard CMSIS-DAP debug probe (OpenSDA)"

  - connector: "USB Micro-B"
    label: "J22"
    classification: hybrid
    count: 1
    protocols:
      - name: USB 2.0
        speed: "480 Mbps"
        features: [OTG, Host, Device]
    power:
      voltage_v: 5
      current_a: 0.5
      direction: input

  - connector: "RJ-45"
    label: "J20"
    classification: data
    count: 1
    protocols:
      - name: "Ethernet"
        speed: "100 Mbps"
        features: [10BASE-T, 100BASE-TX]

  - connector: "SD Card Slot"
    label: "J19"
    classification: data
    count: 1
    protocols:
      - name: SDIO
        speed: "UHS-I"

  - connector: "DC Barrel Jack"
    label: "J1"
    classification: power
    count: 1
    power:
      voltage_v: 5
      direction: input

  - connector: "Pin Header"
    label: "J21"
    classification: debug
    count: 1
    protocols:
      - name: JTAG
        voltage_v: 3.3
      - name: SWD
        voltage_v: 3.3
    notes: "10-pin Cortex debug header"


# ── PIN HEADERS ───────────────────────────────────────────────────────────────

pin_headers:
  - name: "Arduino R3 Header"
    label: "Arduino"
    standard: "Arduino Uno R3"
    pin_count: 54
    pitch_mm: 2.54
    rows: 1
    peripherals:
      gpio: 14
      i2c: 1
      spi: 1
      uart: 1
      pwm: 6
      adc: 6
      dac: null
      can: null
    voltage_levels:
      - voltage_v: 3.3
        standard: LVCMOS

  - name: "mikroBUS Header"
    label: "mikroBUS"
    standard: "mikroBUS"
    pin_count: 16
    pitch_mm: 2.54
    rows: 2
    peripherals:
      i2c: 1
      spi: 1
      uart: 1
      pwm: 1
      adc: 1
      gpio: 2
    voltage_levels:
      - voltage_v: 3.3
        standard: LVCMOS


# ── WIRELESS INTERFACES ───────────────────────────────────────────────────────

wireless: []


# ── INPUTS & OUTPUTS ──────────────────────────────────────────────────────────

inputs:
  - type: button
    label: "SW9"
    count: 1
    function: reset
  - type: button
    label: "SW8"
    count: 1
    function: user
  - type: button
    label: "SW7"
    count: 1
    function: user

outputs:
  - type: led
    label: "Power LED"
    color: green
    count: 1
    function: power_indicator
    programmable: false
  - type: led
    label: "User LED"
    color: red
    count: 1
    function: user
    programmable: true


# ── ON-BOARD COMPONENTS ───────────────────────────────────────────────────────

onboard_components:
  sensors: []
  actuators: []
  display_controllers: []

  memory:
    - type: "SDRAM"
      part_number: "IS42S16160J-6BLI"
      manufacturer: "ISSI"
      capacity_mb: 64
    - type: "HyperFlash"
      part_number: "S26KS512SDPBHI020"
      manufacturer: "Cypress / Infineon"
      capacity_mb: 64
    - type: "QSPI NOR Flash"
      capacity_mb: 512
      notes: "512 MB QSPI NOR via FlexSPI interface"

  power_management: []
  audio: []

  networking:
    - type: ethernet_phy
      part_number: "KSZ8081RNB"
      manufacturer: "Microchip"
      speed_mbps: 100

  crypto: []
  other:
    - type: "CAN FD Transceiver"
      part_number: "TJA1044GT"
      manufacturer: "NXP"
      interface: CAN FD


# ── POWER ─────────────────────────────────────────────────────────────────────

power:
  input_voltage_min_v: 5
  input_voltage_max_v: 5
  recommended_voltage_v: 5
  operating_voltage_v: 3.3

  provides:
    - voltage_v: 3.3
      max_current_ma: 1500
    - voltage_v: 1.8
      max_current_ma: 500

  battery:
    connector: null
    chemistry: []
    charging_circuit: false
    solar_input: false

  consumption:
    - mode: active
      current_ma: 500
      notes: "Typical at 600 MHz CPU with peripherals active"
    - mode: idle
      current_ma: 100
      notes: "Low-power run mode"


# ── THERMAL ───────────────────────────────────────────────────────────────────

thermal:
  operating_temp_min_c: 0
  operating_temp_max_c: 85
  heatsink:
    included: false
    type: none
  notes: "i.MX RT1062 is rated 0–85°C commercial grade"


# ── PHYSICAL / FORM FACTOR ────────────────────────────────────────────────────

physical:
  dimensions_mm:
    length: 163
    width: 102
  form_factor: ["Custom"]
  breadboard_friendly: false
  mounting_holes:
    count: 4
    diameter_mm: 3.2
  enclosure_available: false


# ── BOOT & STARTUP ────────────────────────────────────────────────────────────

boot:
  boot_media:
    - HyperFlash
    - QSPI NOR Flash
    - SD Card
    - USB (serial downloader)
  default_boot: HyperFlash
  bootloader: ["MCU ROM Bootloader"]
  boot_time_seconds: null


# ── SOFTWARE SUPPORT ──────────────────────────────────────────────────────────

software:
  languages:
    - name: C
      support_level: board
    - name: C++
      support_level: board

  frameworks:
    - name: MCUXpresso SDK
      support_level: board
      url: "https://mcuxpresso.nxp.com/"
    - name: Zephyr RTOS
      support_level: board
      version: "3.x"
      board_id: "mimxrt1060_evkb"
    - name: NuttX
      support_level: board
      notes: "Target: imxrt1060-evk"
    - name: FreeRTOS
      support_level: board
      notes: "Included in MCUXpresso SDK"

  os:
    - name: FreeRTOS
      support_level: board
      version: "10.x"
    - name: Zephyr RTOS
      support_level: board
    - name: NuttX
      support_level: board

  ides:
    - name: MCUXpresso IDE
    - name: VS Code
    - name: IAR Embedded Workbench
    - name: Keil MDK

  debugger_support:
    - name: CMSIS-DAP
      interface: USB
    - name: J-Link
      interface: JTAG/SWD
    - name: OpenOCD
      interface: SWD


