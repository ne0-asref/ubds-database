ubds_version: "1.0"

# ── IDENTITY & CLASSIFICATION ─────────────────────────────────────────────────

name: "NVIDIA Jetson Orin Nano Developer Kit"
slug: "jetson-orin-nano-dev-kit"
manufacturer: "NVIDIA"
series: "Jetson"
parent_board: null
hardware_version: "Rev A02"
status: active
release_date: "2023-03-21"
end_of_life_date: null

board_type:
  - SBC
  - AI

difficulty_level: intermediate
ecosystem_size: large
use_cases:
  - AI/ML
  - Robotics
  - Edge Computing
tags:
  - CUDA
  - JetPack


# ── PROCESSING ELEMENTS ───────────────────────────────────────────────────────

processing:
  - name: "Jetson Orin Nano (8GB)"
    part_number: "NVIDIA Orin Nano"
    role: primary
    integrated: true
    type: hybrid
    hybrid_components: [gpu, npu]
    datasheet_url: "https://developer.nvidia.com/..."

    cpu_cores:
      - architecture: "ARM Cortex-A78AE"
        bit_width: 64
        count: 6
        clock_mhz: 1500
        features: [FPU, NEON, TrustZone, Virtualization]

    gpu:
      architecture: Ampere
      cuda_cores: 1024
      tensor_cores: 32
      clock_mhz: 625
      vram_mb: null
      memory_bus_width_bit: 128
      tdp_w: 15

    npu:
      tops: 40
      precision: [INT8, FP16]
      power_efficiency_tops_per_w: 2.67

    memory:
      ram_kb: 8388608   # 8 GB unified
      flash_kb: null
      eeprom_kb: null

    security:
      secure_boot: true
      secure_element: null
      trustzone: true
      hardware_crypto: true
      crypto_algorithms: [AES-256, SHA-256, RSA, ECC]
      tamper_detection: false
      secure_storage: true


# ── PHYSICAL WIRED INTERFACES ─────────────────────────────────────────────────

interfaces:
  - connector: USB-C
    label: "J6"
    classification: hybrid
    count: 1
    protocols:
      - name: "USB 3.2 Gen 2"
        speed: "10 Gbps"
    power:
      voltage_v: 5
      current_a: 3
      direction: input
      supports_pd: true
      pd_profiles: ["5V/3A", "9V/3A", "15V/3A", "20V/2.25A"]

  - connector: RJ-45
    label: "J10"
    classification: data
    count: 1
    protocols:
      - name: "Gigabit Ethernet"
        speed: "1 Gbps"
        features: [Wake-on-LAN, PTP]

  - connector: "M.2 Key M"
    label: "J3"
    classification: data
    count: 1
    protocols:
      - name: NVMe
        speed: "PCIe Gen3 x4"

  - connector: "M.2 Key E"
    label: "J5"
    classification: data
    count: 1
    protocols:
      - name: PCIe
        speed: "PCIe Gen3 x1"
    notes: "For WiFi/BT module"

  - connector: "HDMI Type-A"
    label: "J9"
    classification: data
    count: 1
    protocols:
      - name: HDMI 2.1
        speed: "48 Gbps"
        features: [4K@60Hz, HDR]

  - connector: DisplayPort
    label: "J8"
    classification: data
    count: 1
    protocols:
      - name: "DisplayPort 1.4a"
        speed: "32.4 Gbps"

  - connector: "MIPI CSI-2"
    label: "J7"
    classification: data
    count: 2
    protocols:
      - name: "MIPI CSI-2"
        lanes: 4
    notes: "22-pin camera connector"

  - connector: "DC Barrel Jack"
    label: "J1"
    classification: power
    count: 1
    power:
      voltage_v: 19
      current_a: 2.37
      direction: input
      wattage_w: 45

  - connector: "Pin Header"
    label: "J14"
    classification: debug
    count: 1
    protocols:
      - name: UART
        voltage_v: 3.3
    notes: "Debug UART console"

  - connector: microSD
    label: "J4"
    classification: data
    count: 1
    protocols:
      - name: SDIO
        speed: "UHS-I"
    notes: "Boot media"


# ── PIN HEADERS ───────────────────────────────────────────────────────────────

pin_headers:
  - name: "40-Pin Jetson Expansion Header"
    label: "J12"
    standard: "Jetson"
    pin_count: 40
    pitch_mm: 2.54
    rows: 2
    peripherals:
      gpio: 12
      i2c: 2
      spi: 2
      uart: 2
      pwm: 2
      i2s: 1
      adc: null
      dac: null
      can: null
    voltage_levels:
      - voltage_v: 3.3
        standard: LVCMOS
      - voltage_v: 1.8
        standard: LVCMOS
    power_pins:
      - pin: 1
        voltage_v: 3.3
        max_current_ma: 500
        direction: output
      - pin: 2
        voltage_v: 5
        max_current_ma: 2000
        direction: output


# ── WIRELESS INTERFACES ───────────────────────────────────────────────────────

wireless: []


# ── INPUTS & OUTPUTS ──────────────────────────────────────────────────────────

inputs:
  - type: button
    label: "Power"
    count: 1
    function: power_on_off
  - type: button
    label: "Reset"
    count: 1
    function: reset
  - type: button
    label: "Recovery"
    count: 1
    function: recovery_mode

outputs:
  - type: led
    label: "Power LED"
    color: green
    count: 1
    function: power_indicator
    programmable: false


# ── ON-BOARD COMPONENTS ───────────────────────────────────────────────────────

onboard_components:
  sensors: []
  actuators: []
  display_controllers: []

  memory:
    - type: eMMC
      part_number: null
      capacity_gb: null

  power_management: []
  audio: []

  networking:
    - type: ethernet_phy
      part_number: "RTL8211F"
      manufacturer: "Realtek"
      speed_mbps: 1000

  crypto: []
  other: []


# ── POWER ─────────────────────────────────────────────────────────────────────

power:
  input_voltage_min_v: 9
  input_voltage_max_v: 19
  recommended_voltage_v: 19
  recommended_wattage_w: 45
  operating_voltage_v: 5

  provides:
    - voltage_v: 5
      max_current_ma: 2000
    - voltage_v: 3.3
      max_current_ma: 500
    - voltage_v: 1.8
      max_current_ma: 200

  battery:
    connector: null
    chemistry: []
    charging_circuit: false
    solar_input: false

  consumption:
    - mode: active
      current_ma: 4500
      notes: "Full GPU + CPU load"
    - mode: idle
      current_ma: 1500
      notes: "Desktop idle, display connected"


# ── THERMAL ───────────────────────────────────────────────────────────────────

thermal:
  tdp_w: 15
  operating_temp_min_c: 0
  operating_temp_max_c: 50
  storage_temp_min_c: -25
  storage_temp_max_c: 85
  heatsink:
    included: true
    type: active
  thermal_throttle_temp_c: 97
  notes: "Fan included with dev kit"


# ── PHYSICAL / FORM FACTOR ────────────────────────────────────────────────────

physical:
  dimensions_mm:
    length: 100
    width: 79
    height: 30
  weight_g: 140
  form_factor: ["Jetson"]
  breadboard_friendly: false
  mounting_holes:
    count: 4
    pattern: "Jetson standard"
    diameter_mm: 2.5
  enclosure_available: true


# ── BOOT & STARTUP ────────────────────────────────────────────────────────────

boot:
  boot_media:
    - microSD
    - "NVMe SSD"
    - USB
    - "Network (PXE)"
  default_boot: microSD
  bootloader: ["U-Boot", "UEFI"]
  boot_time_seconds: null


# ── CERTIFICATIONS ────────────────────────────────────────────────────────────

certifications:
  - name: FCC
    id: "2AZCN-P3767"
    region: US
    test_report_url: null
  - name: CE
    id: null
    region: EU
  - name: RoHS


# ── SOFTWARE SUPPORT ──────────────────────────────────────────────────────────

software:
  languages:
    - name: Python
      support_level: board
      version: "3.8+"
      notes: "Full JetPack SDK Python bindings"
    - name: C++
      support_level: board
      version: "C++17"
    - name: C
      support_level: board
    - name: CUDA
      support_level: board
      version: "11.4"
    - name: Rust
      support_level: controller
      notes: "aarch64 target support, no board BSP"

  frameworks:
    - name: "JetPack SDK"
      support_level: board
      version: "6.0"
      url: "https://developer.nvidia.com/jetpack-sdk"
    - name: "ROS 2"
      support_level: board
      version: "Humble"
    - name: DeepStream
      support_level: board
      version: "6.4"

  os:
    - name: Ubuntu
      support_level: board
      version: "20.04"
      variant: "JetPack 6 / L4T"
      notes: "Official NVIDIA Linux4Tegra"

  ai_ml_tools:
    - name: TensorRT
      support_level: board
      version: "8.6"
    - name: PyTorch
      support_level: board
    - name: TensorFlow
      support_level: board
    - name: "ONNX Runtime"
      support_level: board

  ides:
    - name: VS Code
    - name: "Jupyter Notebook"
    - name: "NVIDIA Nsight"

  debugger_support:
    - name: GDB
      interface: UART
    - name: "NVIDIA Nsight Systems"


