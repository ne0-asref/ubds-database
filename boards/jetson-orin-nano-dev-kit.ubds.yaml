# ──────────────────────────────────────────────────────────────────────────────
# CERTIFICATIONS
# ──────────────────────────────────────────────────────────────────────────────

certifications:
  - name: FCC
    id: "2AZCN-P3767"
    region: US
    test_report_url: null
  - name: CE
    id: null
    region: EU
  - name: RoHS
  # Other: UL, CSA, IC, TELEC, KC, NCC, BSMI, SRRC, BIS, VCCI


# ──────────────────────────────────────────────────────────────────────────────
# SOFTWARE SUPPORT
# ──────────────────────────────────────────────────────────────────────────────
# Each entry has a `support_level` to distinguish:
#   board       — Full BSP / board-specific support exists
#   controller  — HAL / driver support for the processing element, but no board BSP
#   community   — Community-maintained, not official
#   experimental— Work in progress, unstable
#   not_supported — Explicitly known to not work

software:

  # ── Programming Languages ──
  languages:
    - name: Python
      support_level: board
      version: "3.8+"
      notes: "Full JetPack SDK Python bindings"
    - name: C++
      support_level: board
      version: "C++17"
    - name: C
      support_level: board
    - name: CUDA
      support_level: board
      version: "11.4"
    - name: Rust
      support_level: controller
      notes: "aarch64 target support, no board BSP"

  # ── Frameworks ──
  frameworks:
    - name: JetPack SDK
      support_level: board
      version: "6.0"
      url: "https://developer.nvidia.com/jetpack-sdk"
    - name: ROS 2
      support_level: board
      version: "Humble"
    - name: DeepStream
      support_level: board
      version: "6.4"
    # - name: Arduino
    #   support_level: board
    #   version: null
    #   board_manager_url: "https://..."
    # - name: PlatformIO
    #   support_level: board
    #   platform_id: "espressif32"
    # - name: ESP-IDF
    #   support_level: board
    #   version: "5.x"
    # - name: Zephyr
    #   support_level: controller
    #   version: "3.6"
    #   board_id: "nucleo_h743zi"

  # ── Operating Systems ──
  os:
    - name: Ubuntu
      support_level: board
      version: "20.04"
      variant: "JetPack 6 / L4T"
      notes: "Official NVIDIA Linux4Tegra"
    # - name: FreeRTOS
    #   support_level: board
    #   version: "10.5"
    # - name: Zephyr RTOS
    #   support_level: controller

  # ── AI / ML Tools ──
  ai_ml_tools:
    - name: TensorRT
      support_level: board
      version: "8.6"
    - name: PyTorch
      support_level: board
    - name: TensorFlow
      support_level: board
    - name: ONNX Runtime
      support_level: board
    # - name: Edge Impulse
    #   support_level: board
    # - name: NXP eIQ
    #   support_level: board
    # - name: TensorFlow Lite
    #   support_level: controller

  # ── IDEs (optional — less critical but some users filter by this) ──
  ides:
    - name: VS Code
    - name: Jupyter Notebook
    - name: NVIDIA Nsight

  # ── Debugger Support ──
