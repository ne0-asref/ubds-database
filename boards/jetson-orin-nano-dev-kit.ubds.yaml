# ============================================================================
# UBDS — Universal Board Description Standard v1.0
# ============================================================================
# A portable, human-readable standard for describing development boards.
# Spec:   https://github.com/<tbd>/ubds
# Schema: ubds-v1.schema.json
#
# - Author boards in YAML → validate with JSON Schema → ingest into any backend.
# - Every field is optional unless marked [REQUIRED].
# - Arrays [] mean "list of"; use empty [] or omit if not applicable.
# - Boards with no processing element (carriers, expansion boards) simply
#   omit the `processing` section entirely.
# - File extension: .ubds.yaml
# ============================================================================
ubds_version: "1.1"


# ──────────────────────────────────────────────────────────────────────────────
# IDENTITY & CLASSIFICATION
# ──────────────────────────────────────────────────────────────────────────────

name: "NVIDIA Jetson Orin Nano Developer Kit"        # [REQUIRED] Display name
slug: "jetson-orin-nano-dev-kit"                      # [REQUIRED] URL-safe unique ID
manufacturer: "NVIDIA"                                # [REQUIRED]
series: "Jetson"                                      # Board family / product line
parent_board: null                                    # slug of parent if this is a variant
hardware_version: "Rev A02"
status: active                                        # active | discontinued | upcoming | prototype
release_date: "2023-03-21"
end_of_life_date: null

# A board can be multiple types simultaneously (e.g. an FPGA board with an MCU)
board_type:                                           # [REQUIRED] at least one
  - SBC
  # ── Valid types ──
  # MCU            — Microcontroller development board
  # SBC            — Single Board Computer
  # SoM            — System on Module
  # Carrier        — Carrier board for SoMs (no processing element of its own)
  # Expansion      — Add-on board (shields, HATs, capes, click boards)
  # FPGA           — FPGA development board
  # AI             — AI/ML accelerator board
  # SDR            — Software Defined Radio board
  # Industrial     — Ruggedized / industrial-grade board
  # DSP            — Digital Signal Processing board
  # Other

difficulty_level: intermediate                        # beginner | intermediate | advanced
ecosystem_size: large                                 # small | medium | large | niche
use_cases:
  - AI/ML
  - Robotics
  - Edge Computing
tags:
  - CUDA
  - JetPack


# ──────────────────────────────────────────────────────────────────────────────
# PROCESSING ELEMENTS
# ──────────────────────────────────────────────────────────────────────────────
# Array of all processing elements on the board.
# Supports heterogeneous compute: MCU + FPGA, multi-core SoCs, co-processors.
# Omit this entire section for boards with no processing element (carriers, etc.)

processing:

  - name: "Jetson Orin Nano (8GB)"
    part_number: "NVIDIA Orin Nano"
    role: primary                                     # primary | co-processor
    integrated: true                                  # true = on-SoC, false = discrete chip
    type: hybrid                                      # mcu | fpga | gpu | npu | tpu | dsp | hybrid
    # For hybrids, list constituent types:
    hybrid_components: [gpu, npu]
    datasheet_url: "https://developer.nvidia.com/..."

    # ── CPU Cores ──
    # Array because cores can be heterogeneous (big.LITTLE, Cortex-A + Cortex-M)
    cpu_cores:
      - architecture: ARM Cortex-A78AE
        bit_width: 64
        count: 6
        clock_mhz: 1500
        features: [FPU, NEON, TrustZone, Virtualization]

    # ── GPU (if applicable) ──
    gpu:
      architecture: Ampere
      cuda_cores: 1024
      tensor_cores: 32
      clock_mhz: 625
      vram_mb: null                                   # null = shared memory
      memory_bus_width_bit: 128
      tdp_w: 15

    # ── NPU (if applicable) ──
    npu:
      tops: 40
      precision: [INT8, FP16]                         # supported precisions
      power_efficiency_tops_per_w: 2.67

    # ── TPU (if applicable) ──
    # tpu:
    #   tflops: 4.0
    #   precision: [INT8, bfloat16]
    #   memory_mb: 8192

    # ── FPGA (if applicable) ──
    # fpga:
    #   family: "Xilinx Artix-7"
    #   logic_cells: 33280
    #   luts: 20800
    #   flip_flops: 41600
    #   embedded_memory_kb: 2160                      # Block RAM
    #   dsp_slices: 90
    #   io_pins: 250
    #   max_clock_mhz: 450

    # ── Internal Memory ──
    memory:
      ram_kb: 8388608                                 # 8 GB unified — in KB for consistency
      flash_kb: null
      eeprom_kb: null

    # ── Security Features ──
    security:
      secure_boot: true
      secure_element: null                            # e.g. "ATECC608A" part number
      trustzone: true
      hardware_crypto: true
      crypto_algorithms: [AES-256, SHA-256, RSA, ECC]
      tamper_detection: false
      secure_storage: true                            # eFuse, OTP, secure key storage

  # ── Example: co-processor on the same board ──
  # - name: "STM32H7"
  #   part_number: "STM32H743ZIT6"
  #   role: co-processor
  #   integrated: false
  #   type: mcu
  #   datasheet_url: "https://..."
  #   cpu_cores:
  #     - architecture: ARM Cortex-M7
  #       bit_width: 32
  #       count: 1
  #       clock_mhz: 480
  #       features: [FPU, DSP]
  #   memory:
  #     ram_kb: 1024
  #     flash_kb: 2048
  #     eeprom_kb: null


# ──────────────────────────────────────────────────────────────────────────────
# PHYSICAL WIRED INTERFACES
# ──────────────────────────────────────────────────────────────────────────────
# Each entry is a physical connector/access point on the board.
# Captures the connector → protocol → power/data classification triple.

interfaces:

  # ── Data/Power Hybrid Example ──
  - connector: USB-C
    label: "J6"                                       # Silkscreen reference designator
    classification: hybrid                            # power | data | debug | hybrid
    count: 1                                          # How many of this exact interface
    protocols:
      - name: USB 3.2 Gen 2
        speed: "10 Gbps"
    power:
      voltage_v: 5
      current_a: 3
      direction: input                                # input | output | bidirectional
      supports_pd: true                               # USB Power Delivery
      pd_profiles: ["5V/3A", "9V/3A", "15V/3A", "20V/2.25A"]

  # ── Data-Only Example ──
  - connector: RJ-45
    label: "J10"
    classification: data
    count: 1
    protocols:
      - name: Gigabit Ethernet
        speed: "1 Gbps"
        features: [Wake-on-LAN, PTP]

  - connector: M.2 Key M
    label: "J3"
    classification: data
    count: 1
    protocols:
      - name: NVMe
        speed: "PCIe Gen3 x4"

  - connector: M.2 Key E
    label: "J5"
    classification: data
    count: 1
    protocols:
      - name: PCIe
        speed: "PCIe Gen3 x1"
    notes: "For WiFi/BT module"

  - connector: HDMI Type-A
    label: "J9"
    classification: data
    count: 1
    protocols:
      - name: HDMI 2.1
        speed: "48 Gbps"
        features: [4K@60Hz, HDR]

  - connector: DisplayPort
    label: "J8"
    classification: data
    count: 1
    protocols:
      - name: DisplayPort 1.4a
        speed: "32.4 Gbps"

  - connector: MIPI CSI-2
    label: "J7"
    classification: data
    count: 2
    protocols:
      - name: MIPI CSI-2
        lanes: 4
    notes: "22-pin camera connector"

  # ── Power-Only Example ──
  - connector: DC Barrel Jack
    label: "J1"
    classification: power
    count: 1
    power:
      voltage_v: 19
      current_a: 2.37
      direction: input
      wattage_w: 45

  # ── Debug Interface ──
  - connector: Pin Header
    label: "J14"
    classification: debug
    count: 1
    protocols:
      - name: UART
        voltage_v: 3.3
    notes: "Debug UART console"

  # Another debug example for MCU boards:
  # - connector: Pin Header
  #   label: "CN4"
  #   classification: debug
  #   count: 1
  #   protocols:
  #     - name: SWD
  #       voltage_v: 3.3
  #     - name: JTAG
  #       voltage_v: 3.3
  #   onboard_debugger: "ST-Link V3"                  # null if external probe required

  # ── microSD Slot ──
  - connector: microSD
    label: "J4"
    classification: data
    count: 1
    protocols:
      - name: SDIO
        speed: "UHS-I"
    notes: "Boot media"


# ──────────────────────────────────────────────────────────────────────────────
# PIN HEADERS
# ──────────────────────────────────────────────────────────────────────────────
# Exposed processing element peripheral pins on standardized or custom headers.
# Separate from interfaces above because headers represent a structured
# collection of mixed-function pins, not a single-purpose connector.

pin_headers:

  - name: "40-Pin Jetson Expansion Header"
    label: "J12"
    standard: "Jetson"                                # Jetson | Arduino Uno R3 | Arduino Mega |
                                                      # Raspberry Pi HAT | Feather | mikroBUS |
                                                      # Grove | Qwiic | PMOD | Custom
    pin_count: 40
    pitch_mm: 2.54
    rows: 2

    # ── Peripheral summary (quick reference) ──
    peripherals:
      gpio: 12
      i2c: 2
      spi: 2
      uart: 2
      pwm: 2
      i2s: 1
      adc: null
      dac: null
      can: null

    # ── Voltage levels (can be a mix) ──
    voltage_levels:
      - voltage_v: 3.3
        standard: LVCMOS                              # LVCMOS | LVTTL | open-drain | etc.
      - voltage_v: 1.8
        standard: LVCMOS

    # ── Power pins on this header ──
    power_pins:
      - pin: 1
        voltage_v: 3.3
        max_current_ma: 500
        direction: output
      - pin: 2
        voltage_v: 5
        max_current_ma: 2000
        direction: output

    # ── Full pinout (optional — can reference image instead) ──
    # If included, captures every pin with function and alternate functions.
    # pins:
    #   - pin: 1
    #     name: 3V3
    #     function: power
    #     voltage_v: 3.3
    #   - pin: 3
    #     name: I2C1_SDA
    #     function: I2C
    #     protocol: I2C
    #     voltage_v: 3.3
    #     alt_functions: [GPIO27]
    #   - pin: 5
    #     name: I2C1_SCL
    #     function: I2C
    #     protocol: I2C
    #     voltage_v: 3.3
    #     alt_functions: [GPIO28]


# ──────────────────────────────────────────────────────────────────────────────
# WIRELESS INTERFACES
# ──────────────────────────────────────────────────────────────────────────────
# Protocol + version pairs. Extensible without schema changes.
# Note: Jetson Orin Nano has no built-in wireless; WiFi/BT added via M.2 Key E.

wireless: []

# ── Example for a board with wireless ──
# wireless:
#   - protocol: WiFi
#     version: "6"                                    # WiFi 6 = 802.11ax
#     standard: "802.11ax"
#     frequency_bands: ["2.4 GHz", "5 GHz"]
#     antenna:
#       type: onboard                                 # onboard | u.fl | sma | ipex
#       gain_dbi: 2.0
#       connectors: 1                                 # number of antenna connectors
#
#   - protocol: Bluetooth
#     version: "5.3"
#     features: [BLE, Bluetooth Classic, Mesh]
#     antenna:
#       type: onboard
#
#   - protocol: LoRa
#     version: null
#     frequency_bands: ["868 MHz", "915 MHz"]
#     module: "SX1276"                                # RF module part number
#     antenna:
#       type: sma
#
#   - protocol: Zigbee
#     version: "3.0"
#     standard: "IEEE 802.15.4"
#
#   - protocol: Thread
#     version: "1.3"
#     standard: "IEEE 802.15.4"
#     features: [Matter-compatible]
#
#   - protocol: NFC
#     version: null
#     standard: "ISO 14443A/B"
#
#   - protocol: UWB
#     version: null
#     module: "DW3000"
#
#   - protocol: Cellular
