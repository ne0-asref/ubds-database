# ──────────────────────────────────────────────────────────────────────────────
# INPUTS & OUTPUTS
# ──────────────────────────────────────────────────────────────────────────────
# Physical user-facing inputs (buttons, switches) and outputs (LEDs, displays).

inputs:
  - type: button
    label: "Power"
    count: 1
    function: power_on_off
  - type: button
    label: "Reset"
    count: 1
    function: reset
  - type: button
    label: "Recovery"
    count: 1
    function: recovery_mode
  # Other types: switch, dip_switch, rotary_encoder, slider, joystick, keypad

outputs:
  - type: led
    label: "Power LED"
    color: green
    count: 1
    function: power_indicator
    programmable: false
  # Other types: rgb_led, led_array, display, buzzer, speaker
  # - type: display
  #   label: "OLED"
  #   technology: OLED
  #   resolution: "128x64"
  #   interface: I2C
  #   size_inches: 0.96
  #   touchscreen: false


