# ──────────────────────────────────────────────────────────────────────────────
# META (provenance, confidence, verification status)
# ──────────────────────────────────────────────────────────────────────────────
# UBDS v1.1 note: pricing/vendor/affiliate data is intentionally NOT part of
# this standard. UBDS describes the board; commerce data lives separately in
# the devboardfinder `board_sellers` table. Contributors: do not add a
# top-level `pricing:` block — it will be rejected by schema validation.

meta:
  sources:                                                # [REQUIRED] at least one verifiable URL
    - "https://developer.nvidia.com/embedded/learn/get-started-jetson-orin-nano-devkit"
    - "https://developer.nvidia.com/embedded/downloads"
  product_url: "https://developer.nvidia.com/embedded/jetson-orin-nano-developer-kit"  # [REQUIRED] canonical manufacturer product page (not a reseller)
  description: |
    Production-ready edge AI developer kit delivering up to 40 TOPS of accelerated
    inference in a 100×79 mm module. Full CUDA, TensorRT, and ROS 2 support through
    the JetPack BSP, with a unified 8 GB LPDDR5 memory pool shared between the
    six-core Cortex-A78AE cluster and the 1024-core Ampere GPU.
  last_verified: "2026-04-18"                             # date this board's data was last checked
  data_completeness: complete                             # stub | partial | complete
  community_reviewed: false                               # true = maintainer reviewed community PR
  verified: true                                          # true = manufacturer-confirmed data

  # Per-section confidence — tells reviewers where to focus verification
  # high = verified against primary source (datasheet, manufacturer page, hands-on testing)
  # medium = likely correct, secondary source (distributor, community wiki, blog)
  # low = best guess, unverified (forum post, estimate, inferred from similar board)
  confidence:
    processing: high
    interfaces: high
    wireless: high                                        # N/A for boards with no wireless
    software: medium
    power: medium
