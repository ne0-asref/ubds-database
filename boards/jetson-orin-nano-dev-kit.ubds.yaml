# ──────────────────────────────────────────────────────────────────────────────
# POWER
# ──────────────────────────────────────────────────────────────────────────────

power:
  # ── Input power ──
  input_voltage_min_v: 9
  input_voltage_max_v: 19
  recommended_voltage_v: 19
  recommended_wattage_w: 45
  operating_voltage_v: 5                              # Core logic operating voltage

  # ── Power output from the board ──
  provides:
    - voltage_v: 5
      max_current_ma: 2000
    - voltage_v: 3.3
      max_current_ma: 500
    - voltage_v: 1.8
      max_current_ma: 200

  # ── Battery support ──
  battery:
    connector: null                                   # JST-PH | JST-SH | bare pads | null
    chemistry: []                                     # [Li-Ion, Li-Po, LiFePO4]
    charging_circuit: false
    solar_input: false

  # ── Consumption profiles ──
  # Multiple modes because real boards have varied power states
  consumption:
    - mode: active
      current_ma: 4500
      notes: "Full GPU + CPU load"
    - mode: idle
      current_ma: 1500
      notes: "Desktop idle, display connected"
    # - mode: light_sleep
    #   current_ua: 500
    # - mode: deep_sleep
    #   current_ua: 10
    # - mode: hibernate
    #   current_ua: 2
    # - mode: tx
    #   current_ma: 350
    #   notes: "WiFi transmit"


# ──────────────────────────────────────────────────────────────────────────────
# THERMAL
# ──────────────────────────────────────────────────────────────────────────────

thermal:
  tdp_w: 15                                          # Thermal Design Power (overall board)
  operating_temp_min_c: 0
  operating_temp_max_c: 50
  storage_temp_min_c: -25
  storage_temp_max_c: 85
  heatsink:
    included: true
    type: active                                      # active (fan) | passive | none
  thermal_throttle_temp_c: 97
  notes: "Fan included with dev kit"


# ──────────────────────────────────────────────────────────────────────────────
# PHYSICAL / FORM FACTOR
# ──────────────────────────────────────────────────────────────────────────────

physical:
  dimensions_mm:
    length: 100
    width: 79
    height: 30                                        # including heatsink
  weight_g: 140
  form_factor: ["Jetson"]                             # Feather | Arduino Uno | Arduino Mega |
                                                      # Raspberry Pi | Jetson | COM Express |
                                                      # 96boards | SMARC | Qwiic | mikroBUS |
                                                      # breadboard | Custom
  breadboard_friendly: false
  mounting_holes:
    count: 4
    pattern: "Jetson standard"
    diameter_mm: 2.5
  enclosure_available: true


# ──────────────────────────────────────────────────────────────────────────────
# BOOT & STARTUP
# ──────────────────────────────────────────────────────────────────────────────

boot:
  boot_media:
    - microSD
    - NVMe SSD
    - USB
    - Network (PXE)
  default_boot: microSD
  bootloader: ["U-Boot", "UEFI"]
  boot_time_seconds: null                             # Typical cold boot to user space


