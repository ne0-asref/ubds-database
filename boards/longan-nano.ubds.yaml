ubds_version: "1.0"

# ── IDENTITY & CLASSIFICATION ─────────────────────────────────────────────────

name: "Sipeed Longan Nano"
slug: "longan-nano"
manufacturer: "Sipeed"
series: "Longan"
parent_board: null
hardware_version: null
status: active
release_date: "2019-09-01"
end_of_life_date: null

board_type:
  - MCU

difficulty_level: intermediate
ecosystem_size: small
use_cases:
  - Embedded Learning
  - IoT Prototyping
  - Wearables
  - Tiny Displays
tags:
  - risc-v
  - gd32
  - breadboard-friendly
  - ips-lcd
  - low-cost


# ── PROCESSING ELEMENTS ───────────────────────────────────────────────────────

processing:
  - name: "GD32VF103CBT6"
    part_number: "GD32VF103CBT6"
    role: primary
    integrated: true
    type: mcu
    datasheet_url: "https://www.gigadevice.com/datasheet/gd32vf103xxxx-datasheet/"

    cpu_cores:
      - architecture: "RISC-V (RV32IMAC)"
        bit_width: 32
        count: 1
        clock_mhz: 108
        features: [ECLIC, WFI, WFE]

    memory:
      ram_kb: 32
      flash_kb: 128
      eeprom_kb: null

    security:
      secure_boot: false
      secure_element: null
      trustzone: false
      hardware_crypto: false
      crypto_algorithms: []
      tamper_detection: false
      secure_storage: false


# ── PHYSICAL WIRED INTERFACES ─────────────────────────────────────────────────

interfaces:
  - connector: "USB-C"
    label: "USB"
    classification: hybrid
    count: 1
    protocols:
      - name: USB 2.0
        speed: "12 Mbps"
        features: [Device, DFU]
    power:
      voltage_v: 5
      current_a: 0.5
      direction: input
    notes: "Used for programming via DFU and power"


# ── PIN HEADERS ───────────────────────────────────────────────────────────────

pin_headers:
  - name: "GPIO Header"
    label: "GPIO"
    standard: "Custom"
    pin_count: 40
    pitch_mm: 2.54
    rows: 2
    peripherals:
      gpio: 37
      i2c: 2
      spi: 2
      uart: 3
      pwm: 6
      adc: 10
      dac: 2
      can: 1
    voltage_levels:
      - voltage_v: 3.3
        standard: LVCMOS
    power_pins:
      - pin: 1
        voltage_v: 3.3
        max_current_ma: 300
        direction: output


# ── WIRELESS INTERFACES ───────────────────────────────────────────────────────

wireless: []


# ── INPUTS & OUTPUTS ──────────────────────────────────────────────────────────

inputs:
  - type: button
    label: "RESET"
    count: 1
    function: reset
  - type: button
    label: "BOOT"
    count: 1
    function: bootloader_mode

outputs:
  - type: led
    label: "R"
    color: red
    count: 1
    function: user
    programmable: true
  - type: led
    label: "G"
    color: green
    count: 1
    function: user
    programmable: true
  - type: led
    label: "B"
    color: blue
    count: 1
    function: user
    programmable: true
  - type: display
    label: "LCD"
    technology: IPS
    resolution: "160x80"
    interface: SPI
    size_inches: 0.96
    touchscreen: false
    count: 1
    function: user


# ── ON-BOARD COMPONENTS ───────────────────────────────────────────────────────

onboard_components:
  sensors: []
  actuators: []

  display_controllers:
    - part_number: "ST7735S"
      manufacturer: "Sitronix"
      interface: SPI
      max_resolution: "160x80"

  memory: []
  power_management: []
  audio: []
  networking: []
  crypto: []
  other: []


# ── POWER ─────────────────────────────────────────────────────────────────────

power:
  input_voltage_min_v: 4.5
  input_voltage_max_v: 5.5
  recommended_voltage_v: 5
  operating_voltage_v: 3.3

  provides:
    - voltage_v: 3.3
      max_current_ma: 300

  battery:
    connector: null
    chemistry: []
    charging_circuit: false
    solar_input: false

  consumption:
    - mode: active
      current_ma: 150
      notes: "Typical with LCD on"


# ── PHYSICAL / FORM FACTOR ────────────────────────────────────────────────────

physical:
  dimensions_mm:
    length: 20
    width: 17.3
  form_factor: ["Custom"]
  breadboard_friendly: true
  enclosure_available: false


# ── BOOT & STARTUP ────────────────────────────────────────────────────────────

boot:
  boot_media:
    - Internal Flash
    - USB DFU
  default_boot: "Internal Flash"
  bootloader: ["GD32VF103 ROM Bootloader", "DFU"]
  boot_time_seconds: null


# ── SOFTWARE SUPPORT ──────────────────────────────────────────────────────────

software:
  languages:
    - name: C
      support_level: board
    - name: C++
      support_level: board
    - name: Rust
      support_level: community
      notes: "riscv32imac-unknown-none-elf target; community crates available"

  frameworks:
    - name: PlatformIO
      support_level: community
      notes: "GD32V platform available in registry"
    - name: Arduino
      support_level: community
      notes: "Community Arduino core for GD32VF103"

  os:
    - name: FreeRTOS
      support_level: community
    - name: RT-Thread
      support_level: community
      notes: "RT-Thread Nano port available"

  ides:
    - name: PlatformIO
    - name: VS Code
    - name: Eclipse (GNU MCU)

  debugger_support:
    - name: OpenOCD
      interface: JTAG
      notes: "Requires external JTAG probe; no onboard debugger"
    - name: GDB
      interface: JTAG


