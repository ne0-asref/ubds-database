ubds_version: "1.0"

# ──────────────────────────────────────────────────────────────────────────────
# IDENTITY & CLASSIFICATION
# ──────────────────────────────────────────────────────────────────────────────

name: "nRF52840 DK"
slug: "nrf52840-dk"
manufacturer: "Nordic Semiconductor"
series: "nRF52"
parent_board: null
hardware_version: null
status: "active"
release_date: null
end_of_life_date: null

board_type:
  - MCU

difficulty_level: intermediate
ecosystem_size: large
use_cases:
  - Bluetooth Low Energy
  - IoT
  - Wireless Sensor Networks
  - Mesh Networking
  - Thread / Matter
  - Zigbee
  - NFC
tags:
  - BLE
  - Bluetooth 5
  - Thread
  - Zigbee
  - 802.15.4
  - NFC
  - Zephyr
  - nRF Connect SDK
  - J-Link


# ──────────────────────────────────────────────────────────────────────────────
# PROCESSING ELEMENTS
# ──────────────────────────────────────────────────────────────────────────────

processing:

  - name: "nRF52840"
    part_number: "nRF52840-QIAA"
    role: primary
    integrated: true
    type: mcu
    datasheet_url: "https://infocenter.nordicsemi.com/pdf/nRF52840_PS_v1.7.pdf"

    cpu_cores:
      - architecture: "ARM Cortex-M4F"
        bit_width: 32
        count: 1
        clock_mhz: 64
        features:
          - FPU
          - DSP
          - TrustZone-M (via CryptoCell-310)

    memory:
      ram_kb: 256
      flash_kb: 1024
      eeprom_kb: null

    security:
      secure_boot: null
      secure_element: null
      trustzone: null
      hardware_crypto: true
      crypto_algorithms:
        - AES-128
        - AES-256
        - ECC
        - SHA-256
        - RSA
        - CHACHA-POLY
        - CCM*
      tamper_detection: false
      secure_storage: true


# ──────────────────────────────────────────────────────────────────────────────
# PHYSICAL WIRED INTERFACES
# ──────────────────────────────────────────────────────────────────────────────

interfaces:

  - connector: "USB-C"
    label: null
    classification: hybrid
    count: 1
    protocols:
      - name: "USB 2.0"
        speed: "12 Mbps"
        features:
          - Device mode
    power:
      voltage_v: 5
      current_a: 0.5
      direction: input
      supports_pd: false

  - connector: "Micro-USB"
    label: null
    classification: debug
    count: 1
    protocols:
      - name: "USB 2.0"
        speed: "12 Mbps"
    notes: "J-Link OB debug interface; virtual COM port"

  - connector: "Pin Header"
    label: "Debug IN"
    classification: debug
    count: 1
    protocols:
      - name: "SWD"
        voltage_v: 3.3
      - name: "JTAG"
        voltage_v: 3.3
    notes: "Onboard J-Link OB; also exposes SWD/JTAG for external targets"


# ──────────────────────────────────────────────────────────────────────────────
# PIN HEADERS
# ──────────────────────────────────────────────────────────────────────────────

pin_headers:

  - name: "Arduino Uno R3 compatible header"
    label: null
    standard: "Arduino Uno R3"
    pin_count: 56
    pitch_mm: 2.54
    rows: 2

    peripherals:
      gpio: 48
      i2c: 2
      spi: 4
      uart: 4
      pwm: 4
      i2s: 1
      adc: 8
      dac: null
      can: null

    voltage_levels:
      - voltage_v: 3.3
        standard: LVCMOS

    power_pins:
      - voltage_v: 5
        max_current_ma: 300
        direction: output
      - voltage_v: 3.3
        max_current_ma: 300
        direction: output


# ──────────────────────────────────────────────────────────────────────────────
# WIRELESS INTERFACES
# ──────────────────────────────────────────────────────────────────────────────

wireless:

  - protocol: Bluetooth
    version: "5.3"
    standard: null
    frequency_bands:
      - "2.4 GHz"
    features:
      - BLE
      - Bluetooth Mesh
      - Long Range (Coded PHY)
      - Direction Finding (AoA/AoD)
    antenna:
      type: onboard

  - protocol: Thread
    version: "1.3"
    standard: "IEEE 802.15.4"
    frequency_bands:
      - "2.4 GHz"
    features:
      - Matter-compatible
    antenna:
      type: onboard

  - protocol: Zigbee
    version: "3.0"
    standard: "IEEE 802.15.4"
    frequency_bands:
      - "2.4 GHz"
    antenna:
      type: onboard

  - protocol: "IEEE 802.15.4"
    version: null
    standard: "IEEE 802.15.4"
    frequency_bands:
      - "2.4 GHz"
    notes: "Raw 802.15.4 radio access"
    antenna:
      type: onboard

  - protocol: NFC
    version: null
    standard: "ISO 14443A"
    frequency_bands:
      - "13.56 MHz"
    features:
      - NFC-A
      - Tag emulation
    notes: "NFC-A tag emulation via on-chip NFC controller; external antenna required"

  - protocol: ANT
    version: null
    frequency_bands:
      - "2.4 GHz"
    antenna:
      type: onboard


# ──────────────────────────────────────────────────────────────────────────────
# INPUTS & OUTPUTS
# ──────────────────────────────────────────────────────────────────────────────

inputs:
  - type: button
    label: "RESET"
    count: 1
    function: reset
  - type: button
    label: "SW1-SW4"
    count: 4
    function: user_programmable

outputs:
  - type: led
    label: "LED1-LED4"
    count: 4
    function: user_programmable
    programmable: true
  - type: led
    label: "Power LED"
    count: 1
    function: power_indicator
    programmable: false


# ──────────────────────────────────────────────────────────────────────────────
# POWER
# ──────────────────────────────────────────────────────────────────────────────

power:
  input_voltage_min_v: 1.7
  input_voltage_max_v: 5.5
  recommended_voltage_v: 5
  operating_voltage_v: 3.3

  provides:
    - voltage_v: 3.3
      max_current_ma: 300
    - voltage_v: 5
      max_current_ma: 300

  battery:
    connector: null
    chemistry: []
    charging_circuit: false
    solar_input: false

  consumption:
    - mode: active_radio_tx
      current_ma: 4.8
      notes: "Bluetooth TX at 0 dBm"
    - mode: active_radio_rx
      current_ma: 5.4
      notes: "Bluetooth RX"
    - mode: cpu_run
      current_ma: 2.3
      notes: "CPU running at 64 MHz, peripherals off"
    - mode: deep_sleep
      current_ua: 0.4
      notes: "System OFF, RAM off"


# ──────────────────────────────────────────────────────────────────────────────
# PHYSICAL / FORM FACTOR
# ──────────────────────────────────────────────────────────────────────────────

physical:
  dimensions_mm:
    length: 102
    width: 64
  form_factor:
    - Custom
  breadboard_friendly: false
  mounting_holes:
    count: 4
  enclosure_available: false


# ──────────────────────────────────────────────────────────────────────────────
# SOFTWARE SUPPORT
# ──────────────────────────────────────────────────────────────────────────────

software:

  languages:
    - name: C
      support_level: board
      notes: "Primary language for nRF Connect SDK and Zephyr"
    - name: C++
      support_level: board
      notes: "Supported in Zephyr and nRF Connect SDK"
    - name: Rust
      support_level: community
      notes: "embassy-rs and nrf-hal provide community Rust support"

  frameworks:
    - name: "nRF Connect SDK"
      support_level: board
      version: "2.x"
      url: "https://developer.nordicsemi.com/nRF_Connect_SDK/doc/latest/nrf/index.html"
      notes: "Nordic's official SDK; built on Zephyr RTOS"
    - name: "Zephyr RTOS"
      support_level: board
      version: "3.x"
      url: "https://docs.zephyrproject.org/"
      board_id: "nrf52840dk"
    - name: "Mbed OS"
      support_level: controller
      notes: "ARM Cortex-M4 target support"
    - name: FreeRTOS
      support_level: community
      notes: "Available via nRF5 SDK legacy path"
    - name: Arduino
      support_level: community
      notes: "Community Arduino core for nRF52840"
      board_manager_url: "https://adafruit.github.io/arduino-board-index/package_adafruit_index.json"

  os:
    - name: "Zephyr RTOS"
      support_level: board
      version: "3.x"
    - name: FreeRTOS
      support_level: community

  ides:
    - name: "VS Code"
    - name: "nRF Connect for VS Code"
    - name: "Segger Embedded Studio"

  debugger_support:
    - name: "J-Link"
      interface: SWD
    - name: "GDB"
      interface: SWD
    - name: "OpenOCD"
      interface: SWD


