ubds_version: "1.0"

# ── IDENTITY & CLASSIFICATION ─────────────────────────────────────────────────

name: "Raspberry Pi 5"
slug: "raspberry-pi-5"
manufacturer: "Raspberry Pi Foundation"
series: "Raspberry Pi"
parent_board: null
hardware_version: null
status: active
release_date: "2023-10-23"
end_of_life_date: null

board_type:
  - SBC

difficulty_level: beginner
ecosystem_size: large
use_cases:
  - Desktop Computing
  - Media Center
  - Home Automation
  - Edge Computing
  - Robotics
  - Retro Gaming
  - AI/ML
tags:
  - raspberry-pi
  - cortex-a76
  - hat
  - nvme
  - linux


# ── PROCESSING ELEMENTS ───────────────────────────────────────────────────────

processing:
  - name: "BCM2712"
    part_number: "BCM2712"
    role: primary
    integrated: true
    type: hybrid
    hybrid_components: [gpu]
    datasheet_url: null

    cpu_cores:
      - architecture: "ARM Cortex-A76"
        bit_width: 64
        count: 4
        clock_mhz: 2400
        features: [FPU, NEON, SVE, TrustZone, Virtualization, MMU]

    gpu:
      architecture: "VideoCore VII"
      clock_mhz: 800

    memory:
      ram_kb: 8388608   # 8 GB LPDDR4X — reference variant
      flash_kb: null
      eeprom_kb: null

    security:
      secure_boot: true
      secure_element: null
      trustzone: true
      hardware_crypto: true
      crypto_algorithms: []
      tamper_detection: false
      secure_storage: false


# ── PHYSICAL WIRED INTERFACES ─────────────────────────────────────────────────

interfaces:
  - connector: "USB-C"
    label: "J1"
    classification: power
    count: 1
    protocols:
      - name: "USB Power Delivery"
    power:
      voltage_v: 5
      current_a: 5
      direction: input
      supports_pd: true
      pd_profiles: ["5V/5A"]
    notes: "Power only; 5V/5A PSU recommended"

  - connector: "USB Type-A"
    label: "USB3"
    classification: data
    count: 2
    protocols:
      - name: USB 3.0
        speed: "5 Gbps"

  - connector: "USB Type-A"
    label: "USB2"
    classification: data
    count: 2
    protocols:
      - name: USB 2.0
        speed: "480 Mbps"

  - connector: "RJ-45"
    label: "ETH"
    classification: data
    count: 1
    protocols:
      - name: "Gigabit Ethernet"
        speed: "1 Gbps"

  - connector: "micro-HDMI"
    label: "HDMI0"
    classification: data
    count: 2
    protocols:
      - name: HDMI 2.0
        speed: "18 Gbps"
        features: [4K@60Hz, HDR, CEC]
    notes: "Two micro-HDMI ports; dual display support"

  - connector: "microSD"
    label: "SD"
    classification: data
    count: 1
    protocols:
      - name: SDIO
        speed: "UHS-I SDR104"
    notes: "Primary boot media"

  - connector: "FPC"
    label: "PCIe"
    classification: data
    count: 1
    protocols:
      - name: PCIe
        speed: "PCIe 2.0 x1"
        features: [M.2 HAT compatible]
    notes: "PCIe FPC connector for M.2 HAT; enables NVMe SSD"

  - connector: "MIPI CSI-2"
    label: "CAM/DISP"
    classification: data
    count: 2
    protocols:
      - name: MIPI CSI-2
        lanes: 4
    notes: "Dual 4-lane MIPI CSI-2 / DSI connectors"


# ── PIN HEADERS ───────────────────────────────────────────────────────────────

pin_headers:
  - name: "40-Pin Raspberry Pi HAT Header"
    label: "J8"
    standard: "Raspberry Pi HAT"
    pin_count: 40
    pitch_mm: 2.54
    rows: 2
    peripherals:
      gpio: 26
      i2c: 5
      spi: 5
      uart: 5
      pwm: 4
      adc: null
      dac: null
      can: null
    voltage_levels:
      - voltage_v: 3.3
        standard: LVCMOS
    power_pins:
      - pin: 1
        voltage_v: 3.3
        max_current_ma: 800
        direction: output
      - pin: 2
        voltage_v: 5
        max_current_ma: 4000
        direction: output


# ── WIRELESS INTERFACES ───────────────────────────────────────────────────────

wireless:
  - protocol: WiFi
    version: "5"
    standard: "802.11ac"
    frequency_bands: ["2.4 GHz", "5 GHz"]
    features: [dual-band]
    antenna:
      type: onboard

  - protocol: Bluetooth
    version: "5.0"
    features: [BLE, Bluetooth Classic]
    antenna:
      type: onboard


# ── INPUTS & OUTPUTS ──────────────────────────────────────────────────────────

inputs:
  - type: button
    label: "Power"
    count: 1
    function: power_on_off

outputs:
  - type: led
    label: "PWR"
    color: red
    count: 1
    function: power_indicator
    programmable: false
  - type: led
    label: "ACT"
    color: green
    count: 1
    function: activity
    programmable: false


# ── ON-BOARD COMPONENTS ───────────────────────────────────────────────────────

onboard_components:
  sensors: []
  actuators: []
  display_controllers: []
  memory: []
  power_management:
    - type: PMIC
      part_number: "RP1"
      manufacturer: "Raspberry Pi"
      notes: "Custom south bridge / I/O controller"
  audio: []

  networking:
    - type: ethernet_phy
      speed_mbps: 1000
      notes: "Integrated in BCM2712 / RP1 south bridge"

  crypto: []
  other:
    - type: RTC
      notes: "Battery-backed RTC with JST connector onboard"


# ── POWER ─────────────────────────────────────────────────────────────────────

power:
  input_voltage_min_v: 5
  input_voltage_max_v: 5
  recommended_voltage_v: 5
  recommended_wattage_w: 25
  operating_voltage_v: 3.3

  provides:
    - voltage_v: 5
      max_current_ma: 4000
    - voltage_v: 3.3
      max_current_ma: 800

  battery:
    connector: "JST"
    chemistry: []
    charging_circuit: false
    solar_input: false
    notes: "RTC battery connector (CR2032 or similar)"

  consumption:
    - mode: active
      current_ma: 3400
      notes: "Full CPU load, no USB devices"
    - mode: idle
      current_ma: 1600
      notes: "Desktop idle, display connected"


# ── THERMAL ───────────────────────────────────────────────────────────────────

thermal:
  operating_temp_min_c: 0
  operating_temp_max_c: 85
  heatsink:
    included: false
    type: none
  notes: "Active cooling recommended under sustained load; official active cooler available"


# ── PHYSICAL / FORM FACTOR ────────────────────────────────────────────────────

physical:
  dimensions_mm:
    length: 85
    width: 56
  weight_g: 37
  form_factor: ["Raspberry Pi"]
  breadboard_friendly: false
  mounting_holes:
    count: 4
    pattern: "Raspberry Pi standard"
    diameter_mm: 2.75
  enclosure_available: true


# ── BOOT & STARTUP ────────────────────────────────────────────────────────────

boot:
  boot_media:
    - microSD
    - NVMe SSD
    - USB
    - Network (PXE)
  default_boot: microSD
  bootloader: ["Raspberry Pi Bootloader (EEPROM)"]
  boot_time_seconds: 20


# ── CERTIFICATIONS ────────────────────────────────────────────────────────────

certifications:
  - name: FCC
    id: null
    region: US
  - name: CE
    id: null
    region: EU
  - name: RoHS


# ── SOFTWARE SUPPORT ──────────────────────────────────────────────────────────

software:
  languages:
    - name: Python
      support_level: board
      version: "3.11+"
    - name: C
      support_level: board
    - name: C++
      support_level: board
    - name: Rust
      support_level: community
    - name: Go
      support_level: community
    - name: Java
      support_level: community
    - name: JavaScript
      support_level: community

  frameworks:
    - name: "Raspberry Pi OS"
      support_level: board
    - name: "GPIO Zero"
      support_level: board
      url: "https://gpiozero.readthedocs.io/"
    - name: "pigpio"
      support_level: community
    - name: ROS 2
      support_level: community

  os:
    - name: "Raspberry Pi OS"
      support_level: board
      version: "Bookworm (Debian 12)"
      notes: "Official OS"
    - name: Ubuntu
      support_level: board
      version: "24.04 LTS"
    - name: Fedora
      support_level: community
    - name: Arch Linux ARM
      support_level: community

  ides:
    - name: VS Code
    - name: Thonny
    - name: Geany

  debugger_support:
    - name: GDB
      interface: UART
    - name: "Raspberry Pi Debug Probe"
      interface: SWD


