ubds_version: "1.0"

# ──────────────────────────────────────────────────────────────────────────────
# IDENTITY & CLASSIFICATION
# ──────────────────────────────────────────────────────────────────────────────

name: "Raspberry Pi Pico 2"
slug: "raspberry-pi-pico-2"
manufacturer: "Raspberry Pi Foundation"
series: "Pico"
parent_board: "raspberry-pi-pico"
hardware_version: null
status: active
release_date: "2024-08-08"
end_of_life_date: null

board_type:
  - MCU

difficulty_level: beginner
ecosystem_size: medium
use_cases:
  - Embedded Systems
  - IoT
  - Education
  - Prototyping
  - Robotics
tags:
  - RP2350
  - MicroPython
  - CircuitPython
  - breadboard
  - RISC-V
  - TrustZone


# ──────────────────────────────────────────────────────────────────────────────
# PROCESSING ELEMENTS
# ──────────────────────────────────────────────────────────────────────────────

processing:

  - name: "RP2350"
    part_number: "RP2350"
    role: primary
    integrated: true
    type: mcu
    datasheet_url: "https://datasheets.raspberrypi.com/rp2350/rp2350-datasheet.pdf"

    # RP2350 has 4 cores total: 2x Cortex-M33 + 2x Hazard3 RISC-V (only one pair active at a time)
    cpu_cores:
      - architecture: "ARM Cortex-M33"
        bit_width: 32
        count: 2
        clock_mhz: 150
        features: [FPU, DSP, TrustZone]
      - architecture: "Hazard3 RISC-V"
        bit_width: 32
        count: 2
        clock_mhz: 150
        features: [RV32IMAC]

    memory:
      ram_kb: 520
      flash_kb: null     # Flash is external (off-chip)
      eeprom_kb: null

    security:
      secure_boot: true
      secure_element: null
      trustzone: true
      hardware_crypto: true
      crypto_algorithms: [AES-128, SHA-256, TRNG]
      tamper_detection: false
      secure_storage: true   # OTP (one-time programmable) fuses


# ──────────────────────────────────────────────────────────────────────────────
# PHYSICAL WIRED INTERFACES
# ──────────────────────────────────────────────────────────────────────────────

interfaces:

  - connector: "Micro-USB"
    label: null
    classification: hybrid
    count: 1
    protocols:
      - name: "USB 1.1"
        speed: "12 Mbps"
    power:
      voltage_v: 5
      current_a: 0.6
      direction: input

  - connector: "Pin Header"
    label: "SWD"
    classification: debug
    count: 1
    protocols:
      - name: SWD
        voltage_v: 3.3
    notes: "3-pin SWD debug port on pads (SWCLK, SWDIO, GND). No onboard debug probe — requires external probe."


# ──────────────────────────────────────────────────────────────────────────────
# PIN HEADERS
# ──────────────────────────────────────────────────────────────────────────────

pin_headers:

  - name: "GPIO Header"
    label: null
    standard: "Custom"
    pin_count: 40
    pitch_mm: 2.54
    rows: 2

    peripherals:
      gpio: 26
      i2c: 2
      spi: 2
      uart: 2
      pwm: 16
      i2s: null
      adc: 4
      dac: null
      can: null

    voltage_levels:
      - voltage_v: 3.3
        standard: LVCMOS

    power_pins:
      - pin: 36
        voltage_v: 3.3
        max_current_ma: 300
        direction: output
      - pin: 39
        voltage_v: 5
        max_current_ma: 600
        direction: input

    # Note: same pinout as Raspberry Pi Pico (backward compatible).
    # Board also has castellated edge pads for direct PCB soldering.


# ──────────────────────────────────────────────────────────────────────────────
# WIRELESS INTERFACES
# ──────────────────────────────────────────────────────────────────────────────

wireless: []


# ──────────────────────────────────────────────────────────────────────────────
# INPUTS & OUTPUTS
# ──────────────────────────────────────────────────────────────────────────────

inputs:
  - type: button
    label: "BOOTSEL"
    count: 1
    function: bootloader_mode

outputs:
  - type: led
    label: "LED"
    color: green
    count: 1
    function: user_programmable
    programmable: true


# ──────────────────────────────────────────────────────────────────────────────
# ON-BOARD COMPONENTS
# ──────────────────────────────────────────────────────────────────────────────

onboard_components:

  sensors: []
  actuators: []
  display_controllers: []

  memory:
    - type: "QSPI Flash"
      part_number: null
      manufacturer: null
      interface: QSPI

  power_management: []
  audio: []
  networking: []
  crypto: []
  other: []


# ──────────────────────────────────────────────────────────────────────────────
# POWER
# ──────────────────────────────────────────────────────────────────────────────

power:
  input_voltage_min_v: 1.8
  input_voltage_max_v: 5.5
  recommended_voltage_v: 5
  operating_voltage_v: 3.3

  provides:
    - voltage_v: 3.3
      max_current_ma: 300

  battery:
    connector: null
    chemistry: []
    charging_circuit: false
    solar_input: false

  consumption:
    - mode: active
      current_ma: 100
      notes: "Typical active @ 150 MHz, approximate"
    - mode: deep_sleep
      current_ua: 10
      notes: "DORMANT mode, approximate"


# ──────────────────────────────────────────────────────────────────────────────
# PHYSICAL / FORM FACTOR
# ──────────────────────────────────────────────────────────────────────────────

physical:
  dimensions_mm:
    length: 51
    width: 21
    height: 3.9
  weight_g: 3
  form_factor: ["Custom"]
  breadboard_friendly: true
  mounting_holes:
    count: 4
    pattern: "corner"
    diameter_mm: 2.1
  enclosure_available: false


# ──────────────────────────────────────────────────────────────────────────────
# BOOT & STARTUP
# ──────────────────────────────────────────────────────────────────────────────

boot:
  boot_media:
    - "QSPI Flash"
    - "USB (UF2 mass storage)"
  default_boot: "QSPI Flash"
  bootloader: ["RP2350 ROM bootloader", "UF2"]
  boot_time_seconds: null


# ──────────────────────────────────────────────────────────────────────────────
# SOFTWARE SUPPORT
# ──────────────────────────────────────────────────────────────────────────────

software:

  languages:
    - name: "C"
      support_level: board
      notes: "Official Pico C/C++ SDK with RP2350 support"
      url: "https://github.com/raspberrypi/pico-sdk"
    - name: "C++"
      support_level: board
      notes: "Official Pico C/C++ SDK with RP2350 support"
      url: "https://github.com/raspberrypi/pico-sdk"
    - name: "MicroPython"
      support_level: board
      notes: "Official MicroPython port for Pico 2 / RP2350"
      url: "https://micropython.org/download/RPI_PICO2/"
    - name: "CircuitPython"
      support_level: board
      notes: "Official Adafruit CircuitPython port for Pico 2"
      url: "https://circuitpython.org/board/raspberry_pi_pico2/"
    - name: "Python"
      support_level: board
      variant: "MicroPython"
    - name: "Rust"
      support_level: community
      notes: "rp-hal community crate, RP2350 support in progress"
      url: "https://github.com/rp-rs/rp-hal"

  frameworks:
    - name: "Pico SDK"
      support_level: board
      version: "2.x"
      url: "https://github.com/raspberrypi/pico-sdk"
    - name: "Arduino"
      support_level: community
      notes: "Community Arduino core with RP2350 support"
      board_manager_url: "https://github.com/earlephilhower/arduino-pico/releases/download/global/package_rp2040_index.json"
    - name: "FreeRTOS"
      support_level: community
      notes: "FreeRTOS SMP port; RP2350 support via Pico SDK"

  os:
    - name: "FreeRTOS"
      support_level: community
    - name: "Zephyr RTOS"
      support_level: community

  ides:
    - name: "VS Code"
    - name: "Thonny"
    - name: "Arduino IDE"

  debugger_support:
    - name: "OpenOCD"
      interface: SWD
    - name: "picoprobe"
      interface: SWD


