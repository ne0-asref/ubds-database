ubds_version: "1.0"

# ──────────────────────────────────────────────────────────────────────────────
# IDENTITY & CLASSIFICATION
# ──────────────────────────────────────────────────────────────────────────────

name: "Raspberry Pi Pico"
slug: "raspberry-pi-pico"
manufacturer: "Raspberry Pi Foundation"
series: "Pico"
parent_board: null
hardware_version: null
status: active
release_date: "2021-01-21"
end_of_life_date: null

board_type:
  - MCU

difficulty_level: beginner
ecosystem_size: large
use_cases:
  - Embedded Systems
  - IoT
  - Education
  - Prototyping
  - Robotics
tags:
  - RP2040
  - MicroPython
  - CircuitPython
  - breadboard


# ──────────────────────────────────────────────────────────────────────────────
# PROCESSING ELEMENTS
# ──────────────────────────────────────────────────────────────────────────────

processing:

  - name: "RP2040"
    part_number: "RP2040"
    role: primary
    integrated: true
    type: mcu
    datasheet_url: "https://datasheets.raspberrypi.com/rp2040/rp2040-datasheet.pdf"

    cpu_cores:
      - architecture: "ARM Cortex-M0+"
        bit_width: 32
        count: 2
        clock_mhz: 133
        features: [FPU]

    memory:
      ram_kb: 264
      flash_kb: null     # Flash is external (off-chip)
      eeprom_kb: null


# ──────────────────────────────────────────────────────────────────────────────
# PHYSICAL WIRED INTERFACES
# ──────────────────────────────────────────────────────────────────────────────

interfaces:

  - connector: "Micro-USB"
    label: null
    classification: hybrid
    count: 1
    protocols:
      - name: "USB 1.1"
        speed: "12 Mbps"
    power:
      voltage_v: 5
      current_a: 0.5
      direction: input

  - connector: "Pin Header"
    label: "SWD"
    classification: debug
    count: 1
    protocols:
      - name: SWD
        voltage_v: 3.3
    notes: "3-pin SWD debug port on pads (SWC, SWD, GND). No onboard debug probe — requires external probe (e.g. Pico as Picoprobe)."


# ──────────────────────────────────────────────────────────────────────────────
# PIN HEADERS
# ──────────────────────────────────────────────────────────────────────────────

pin_headers:

  - name: "GPIO Header"
    label: null
    standard: "Custom"
    pin_count: 40
    pitch_mm: 2.54
    rows: 2

    peripherals:
      gpio: 26
      i2c: 2
      spi: 2
      uart: 2
      pwm: 16
      i2s: null
      adc: 3
      dac: null
      can: null

    voltage_levels:
      - voltage_v: 3.3
        standard: LVCMOS

    power_pins:
      - pin: 36
        voltage_v: 3.3
        max_current_ma: 300
        direction: output
      - pin: 39
        voltage_v: 5
        max_current_ma: 500
        direction: input

    # Note: board also has castellated edge pads for direct PCB soldering


# ──────────────────────────────────────────────────────────────────────────────
# WIRELESS INTERFACES
# ──────────────────────────────────────────────────────────────────────────────

wireless: []


# ──────────────────────────────────────────────────────────────────────────────
# INPUTS & OUTPUTS
# ──────────────────────────────────────────────────────────────────────────────

inputs:
  - type: button
    label: "BOOTSEL"
    count: 1
    function: bootloader_mode

outputs:
  - type: led
    label: "LED"
    color: green
    count: 1
    function: user_programmable
    programmable: true


# ──────────────────────────────────────────────────────────────────────────────
# ON-BOARD COMPONENTS
# ──────────────────────────────────────────────────────────────────────────────

onboard_components:

  sensors: []
  actuators: []
  display_controllers: []

  memory:
    - type: "QSPI Flash"
      part_number: "W25Q16JV"
      manufacturer: "Winbond"
      interface: QSPI

  power_management: []
  audio: []
  networking: []
  crypto: []
  other: []


# ──────────────────────────────────────────────────────────────────────────────
# POWER
# ──────────────────────────────────────────────────────────────────────────────

power:
  input_voltage_min_v: 1.8
  input_voltage_max_v: 5.5
  recommended_voltage_v: 5
  operating_voltage_v: 3.3

  provides:
    - voltage_v: 3.3
      max_current_ma: 300

  battery:
    connector: null
    chemistry: []
    charging_circuit: false
    solar_input: false

  consumption:
    - mode: active
      current_ma: 93
      notes: "Typical active @ 133 MHz, no peripherals"
    - mode: deep_sleep
      current_ua: 180
      notes: "DORMANT mode, RTC wake"


# ──────────────────────────────────────────────────────────────────────────────
# PHYSICAL / FORM FACTOR
# ──────────────────────────────────────────────────────────────────────────────

physical:
  dimensions_mm:
    length: 51
    width: 21
    height: 3.9
  weight_g: 3
  form_factor: ["Custom"]
  breadboard_friendly: true
  mounting_holes:
    count: 4
    pattern: "corner"
    diameter_mm: 2.1
  enclosure_available: false


# ──────────────────────────────────────────────────────────────────────────────
# BOOT & STARTUP
# ──────────────────────────────────────────────────────────────────────────────

boot:
  boot_media:
    - "QSPI Flash"
    - "USB (UF2 mass storage)"
  default_boot: "QSPI Flash"
  bootloader: ["RP2040 ROM bootloader", "UF2"]
  boot_time_seconds: null


# ──────────────────────────────────────────────────────────────────────────────
# SOFTWARE SUPPORT
# ──────────────────────────────────────────────────────────────────────────────

software:

  languages:
    - name: "C"
      support_level: board
      notes: "Official Pico C/C++ SDK"
      url: "https://github.com/raspberrypi/pico-sdk"
    - name: "C++"
      support_level: board
      notes: "Official Pico C/C++ SDK"
      url: "https://github.com/raspberrypi/pico-sdk"
    - name: "MicroPython"
      support_level: board
      notes: "Official MicroPython port by Raspberry Pi"
      url: "https://micropython.org/download/RPI_PICO/"
    - name: "CircuitPython"
      support_level: board
      notes: "Official Adafruit CircuitPython port"
      url: "https://circuitpython.org/board/raspberry_pi_pico/"
    - name: "Python"
      support_level: board
      variant: "MicroPython"
    - name: "Rust"
      support_level: community
      notes: "rp-hal community crate"
      url: "https://github.com/rp-rs/rp-hal"

  frameworks:
    - name: "Pico SDK"
      support_level: board
      version: "2.x"
      url: "https://github.com/raspberrypi/pico-sdk"
    - name: "Arduino"
      support_level: community
      notes: "Community Arduino core for RP2040"
      board_manager_url: "https://github.com/earlephilhower/arduino-pico/releases/download/global/package_rp2040_index.json"
    - name: "FreeRTOS"
      support_level: community
      notes: "FreeRTOS SMP port for RP2040"

  os:
    - name: "FreeRTOS"
      support_level: community
    - name: "Zephyr RTOS"
      support_level: community

  ides:
    - name: "VS Code"
    - name: "Thonny"
    - name: "Arduino IDE"

  debugger_support:
    - name: "OpenOCD"
      interface: SWD
    - name: "picoprobe"
      interface: SWD


