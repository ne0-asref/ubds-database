ubds_version: "1.0"

# ──────────────────────────────────────────────────────────────────────────────
# IDENTITY & CLASSIFICATION
# ──────────────────────────────────────────────────────────────────────────────

name: "STM32 NUCLEO-F446RE"
slug: "stm32-nucleo-f446re"
manufacturer: "STMicroelectronics"
series: "Nucleo-64"
parent_board: null
hardware_version: null
status: active
release_date: "2015-01-01"
end_of_life_date: null

board_type:
  - MCU

difficulty_level: intermediate
ecosystem_size: large
use_cases:
  - Embedded Systems
  - Motor Control
  - IoT Prototyping
  - Signal Processing
  - Industrial Control
tags:
  - STM32
  - ARM Cortex-M4
  - Nucleo
  - ST-Link
  - Arduino-compatible


# ──────────────────────────────────────────────────────────────────────────────
# PROCESSING ELEMENTS
# ──────────────────────────────────────────────────────────────────────────────

processing:

  - name: "STM32F446RE"
    part_number: "STM32F446RET6"
    role: primary
    integrated: true
    type: mcu
    datasheet_url: "https://www.st.com/resource/en/datasheet/stm32f446re.pdf"

    cpu_cores:
      - architecture: "ARM Cortex-M4"
        bit_width: 32
        count: 1
        clock_mhz: 180
        features: [FPU, DSP, Thumb-2]

    memory:
      ram_kb: 128
      flash_kb: 512
      eeprom_kb: null

    security:
      secure_boot: null
      secure_element: null
      trustzone: null
      hardware_crypto: null
      crypto_algorithms: []
      tamper_detection: null
      secure_storage: null


# ──────────────────────────────────────────────────────────────────────────────
# PHYSICAL WIRED INTERFACES
# ──────────────────────────────────────────────────────────────────────────────

interfaces:

  - connector: "USB Mini-B"
    label: "CN1"
    classification: hybrid
    count: 1
    protocols:
      - name: "USB 2.0 Full Speed"
        speed: "12 Mbps"
        features: ["ST-Link V2-1 debug", "Virtual COM Port", "Mass Storage"]
    notes: "ST-Link V2-1 onboard debugger — programs and debugs the target MCU"

  - connector: "Pin Header"
    label: "CN4"
    classification: debug
    count: 1
    protocols:
      - name: SWD
        voltage_v: 3.3
    notes: "SWD debug/programming header; can connect external probe"


# ──────────────────────────────────────────────────────────────────────────────
# PIN HEADERS
# ──────────────────────────────────────────────────────────────────────────────

pin_headers:

  - name: "Arduino Uno R3 Headers"
    label: "CN5/CN6/CN8/CN9/CN10"
    standard: "Arduino Uno R3"
    pin_count: 32
    pitch_mm: 2.54
    rows: 1

    peripherals:
      gpio: 16
      i2c: 1
      spi: 1
      uart: 1
      pwm: 6
      adc: 6
      dac: null
      can: null

    voltage_levels:
      - voltage_v: 3.3
        standard: LVCMOS
      - voltage_v: 5
        standard: LVTTL

    power_pins:
      - pin: 1
        voltage_v: 3.3
        max_current_ma: 300
        direction: output
      - pin: 2
        voltage_v: 5
        max_current_ma: 500
        direction: output

  - name: "ST Morpho Extension Headers"
    label: "CN7/CN10"
    standard: "Custom"
    pin_count: 76
    pitch_mm: 2.54
    rows: 2
    notes: "Full MCU peripheral access including all GPIO, USART, SPI, I2C, timers"

    peripherals:
      gpio: 50
      i2c: 3
      spi: 3
      uart: 6
      adc: 16
      dac: 2
      can: 1

    voltage_levels:
      - voltage_v: 3.3
        standard: LVCMOS


# ──────────────────────────────────────────────────────────────────────────────
# WIRELESS INTERFACES
# ──────────────────────────────────────────────────────────────────────────────

wireless: []


# ──────────────────────────────────────────────────────────────────────────────
# INPUTS & OUTPUTS
# ──────────────────────────────────────────────────────────────────────────────

inputs:
  - type: button
    label: "B1 USER"
    count: 1
    function: user_defined
  - type: button
    label: "RESET"
    count: 1
    function: reset

outputs:
  - type: led
    label: "LD1 (COM)"
    color: green
    count: 1
    function: "ST-Link communication indicator"
    programmable: false
  - type: led
    label: "LD2 (USER)"
    color: green
    count: 1
    function: user_defined
    programmable: true
  - type: led
    label: "LD3 (PWR)"
    color: red
    count: 1
    function: power_indicator
    programmable: false


# ──────────────────────────────────────────────────────────────────────────────
# POWER
# ──────────────────────────────────────────────────────────────────────────────

power:
  input_voltage_min_v: 3
  input_voltage_max_v: 5
  recommended_voltage_v: 5
  operating_voltage_v: 3.3

  provides:
    - voltage_v: 3.3
      max_current_ma: 300
    - voltage_v: 5
      max_current_ma: 500

  battery:
    connector: null
    chemistry: []
    charging_circuit: false
    solar_input: false

  consumption:
    - mode: active
      current_ma: 100
      notes: "Typical at 180 MHz, all peripherals active"
    - mode: run
      current_ma: 42
      notes: "Typical at 168 MHz from datasheet"


# ──────────────────────────────────────────────────────────────────────────────
# PHYSICAL / FORM FACTOR
# ──────────────────────────────────────────────────────────────────────────────

physical:
  dimensions_mm:
    length: 82.5
    width: 70
    height: 14
  weight_g: 28
  form_factor: ["Nucleo-64", "Arduino Uno R3"]
  breadboard_friendly: false
  mounting_holes:
    count: 4
    pattern: "Nucleo-64 standard"
    diameter_mm: 3.2
  enclosure_available: false


# ──────────────────────────────────────────────────────────────────────────────
# SOFTWARE SUPPORT
# ──────────────────────────────────────────────────────────────────────────────

software:

  languages:
    - name: C
      support_level: board
      notes: "Primary development language with HAL and LL drivers"
    - name: C++
      support_level: board
      notes: "Supported via all major frameworks"
    - name: Rust
      support_level: community
      notes: "stm32f4xx-hal crate; no official BSP"

  frameworks:
    - name: STM32CubeMX / HAL
      support_level: board
      url: "https://www.st.com/en/development-tools/stm32cubemx.html"
      notes: "Official ST hardware abstraction layer and code generator"
    - name: Mbed OS
      support_level: board
      url: "https://os.mbed.com/platforms/ST-Nucleo-F446RE/"
      notes: "Official Mbed target support"
    - name: Zephyr RTOS
      support_level: controller
      board_id: "nucleo_f446re"
      url: "https://docs.zephyrproject.org/latest/boards/st/nucleo_f446re/"
    - name: PlatformIO
      support_level: board
      platform_id: "ststm32"
      board_id: "nucleo_f446re"
      url: "https://platformio.org/boards/nucleo_f446re"
    - name: Arduino
      support_level: community
      notes: "Community support via STM32duino board package"
      board_manager_url: "https://github.com/stm32duino/BoardManagerFiles/raw/main/package_stmicroelectronics_index.json"

  ides:
    - name: STM32CubeIDE
    - name: VS Code
    - name: Keil MDK
    - name: IAR Embedded Workbench

  debugger_support:
    - name: ST-Link V2-1
      interface: SWD
    - name: OpenOCD
      interface: SWD
    - name: J-Link
      interface: SWD


