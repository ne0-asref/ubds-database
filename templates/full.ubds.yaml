# UBDS Full Template — covers all commonly-used sections
# For the complete field reference, see templates/reference.ubds.yaml
# Validate: dbf validate boards/your-board.ubds.yaml

ubds_version: "1.0"

# ── IDENTITY & CLASSIFICATION ────────────────────────────────────────────────

name: "Your Board Name"
slug: "your-board-name"              # lowercase, hyphens only, must be unique
manufacturer: "Manufacturer"
series: null                         # product line, e.g. "Feather", "Nucleo"
parent_board: null                   # slug of parent if this is a variant
hardware_version: null               # e.g. "Rev C"
status: active                       # active | discontinued | upcoming | prototype
release_date: null                   # YYYY-MM-DD
end_of_life_date: null

board_type:
  - MCU                              # MCU | SBC | SoM | Carrier | Expansion | FPGA | DSP | AI | Sensor | Motor | Camera | Audio | Network

difficulty_level: beginner           # beginner | intermediate | advanced
ecosystem_size: medium               # small | medium | large | niche
use_cases:                           # freeform list
  - IoT
  - Prototyping
tags: []                             # freeform tags for search


# ── PROCESSING ELEMENTS ──────────────────────────────────────────────────────

processing:
  - name: "Main Chip"
    part_number: null
    role: primary                    # primary | co-processor
    integrated: true
    type: mcu                        # mcu | fpga | gpu | npu | tpu | dsp | hybrid
    datasheet_url: null

    cpu_cores:
      - architecture: "ARM Cortex-M4"
        bit_width: 32
        count: 1
        clock_mhz: 120
        features: []                 # e.g. [FPU, DSP, MPU]

    # Uncomment if the chip has a GPU:
    # gpu:
    #   architecture: null
    #   cuda_cores: null
    #   clock_mhz: null

    # Uncomment if the chip has an NPU/ML accelerator:
    # npu:
    #   tops: null
    #   precision: []

    memory:
      ram_kb: 256
      flash_kb: 1024
      eeprom_kb: null

    security:
      secure_boot: false
      trustzone: false
      hardware_crypto: false
      crypto_algorithms: []
      tamper_detection: false
      secure_storage: false


# ── PHYSICAL WIRED INTERFACES ────────────────────────────────────────────────

interfaces:
  - connector: USB-C                 # physical connector type
    label: null                      # silkscreen label, e.g. "J1"
    classification: hybrid           # power | data | debug | hybrid
    count: 1
    protocols:
      - name: "USB 2.0"
        speed: "480 Mbps"
    power:
      voltage_v: 5
      current_a: 0.5
      direction: input               # input | output | bidirectional

  # Add more interfaces as needed:
  # - connector: "Pin Header"
  #   label: "J2"
  #   classification: debug
  #   count: 1
  #   protocols:
  #     - name: UART
  #       voltage_v: 3.3


# ── PIN HEADERS ──────────────────────────────────────────────────────────────

pin_headers:
  - name: "Main Header"
    label: null
    standard: null                   # e.g. "Arduino Uno", "Feather", "Raspberry Pi"
    pin_count: 20
    pitch_mm: 2.54
    rows: 2
    peripherals:
      gpio: 10
      i2c: 1
      spi: 1
      uart: 1
      pwm: 4
      adc: 4
      dac: 0
      can: 0
    voltage_levels:
      - voltage_v: 3.3
        standard: LVCMOS


# ── WIRELESS INTERFACES ─────────────────────────────────────────────────────

wireless:
  - type: wifi                       # wifi | ble | zigbee | lora | thread | ...
    standard: "802.11n"
    frequency_ghz: [2.4]
    antenna: onboard                 # onboard | u.fl | sma | ipex
    # Uncomment for BLE:
    # - type: ble
    #   standard: "5.0"
    #   antenna: onboard


# ── INPUTS & OUTPUTS ─────────────────────────────────────────────────────────

inputs:
  - type: button
    label: "BOOT"
    count: 1
    function: boot_mode
  - type: button
    label: "RESET"
    count: 1
    function: reset

outputs:
  - type: led
    label: "LED"
    color: blue
    count: 1
    function: user_programmable
    programmable: true


# ── ON-BOARD COMPONENTS ──────────────────────────────────────────────────────

onboard_components:
  sensors: []
  actuators: []
  display_controllers: []
  memory: []
  power_management: []
  audio: []
  networking: []
  crypto: []
  other: []


# ── POWER ────────────────────────────────────────────────────────────────────

power:
  input_voltage_min_v: 3.3
  input_voltage_max_v: 5
  recommended_voltage_v: 5
  operating_voltage_v: 3.3

  provides:
    - voltage_v: 3.3
      max_current_ma: 500

  battery:
    connector: null                  # e.g. "JST-PH 2-pin"
    chemistry: []                    # e.g. [LiPo]
    charging_circuit: false
    solar_input: false

  consumption:
    - mode: active
      current_ma: null
    - mode: sleep
      current_ma: null


# ── THERMAL ──────────────────────────────────────────────────────────────────

thermal:
  operating_temp_min_c: -40
  operating_temp_max_c: 85


# ── PHYSICAL / FORM FACTOR ──────────────────────────────────────────────────

physical:
  dimensions_mm:
    length: null
    width: null
    height: null
  weight_g: null
  form_factor: []                    # e.g. ["Feather"], ["Arduino Uno"]
  breadboard_friendly: true
  mounting_holes:
    count: 0


# ── BOOT & STARTUP ──────────────────────────────────────────────────────────

boot:
  boot_media:
    - "Internal Flash"
  default_boot: "Internal Flash"
  bootloader: []


# ── CERTIFICATIONS ──────────────────────────────────────────────────────────

certifications: []
  # - name: FCC
  #   region: US
  # - name: CE
  #   region: EU


# ── SOFTWARE SUPPORT ─────────────────────────────────────────────────────────

software:
  languages:
    - name: C
      support_level: board           # board | controller | community | experimental
    - name: C++
      support_level: board

  frameworks:
    - name: "Arduino"
      support_level: board
      url: null

  os: []
    # - name: "Zephyr"
    #   support_level: board
    #   version: null

  ides:
    - name: "Arduino IDE"
    - name: "VS Code"

  debugger_support:
    - name: GDB
      interface: SWD


# ── COMMUNITY & ECOSYSTEM ───────────────────────────────────────────────────

community:
  github_repos: null
  forum_url: null
  discord_url: null


# ── RESOURCES ────────────────────────────────────────────────────────────────

resources:
  board:
    - title: "Getting Started"
      url: null
      format: tutorial               # tutorial | video | course | book | blog | documentation | example | tool
      cost: free                     # free | paid | freemium


# ── LIBRARIES ────────────────────────────────────────────────────────────────

libraries: []
  # - name: "Library Name"
  #   description: "What it does"
  #   language: "C"
  #   category: "Drivers"
  #   repo_url: null


# ── COMPATIBLE BOARDS ───────────────────────────────────────────────────────

compatible_boards: []
  # - slug: "other-board-slug"
  #   relationship: shield            # module | carrier | shield | hat | click | ...


# ── METADATA & LINKS ────────────────────────────────────────────────────────

metadata:
  official_page_url: null
  image_url: null                    # https://raw.githubusercontent.com/ne0-asref/ubds-images/main/images/{slug}/top-view.png
  image_tags: [top-view]
  datasheet_url: null
  getting_started_urls: []


# ── PRICING & AVAILABILITY ──────────────────────────────────────────────────

pricing:
  msrp_usd: null
  vendors: []
    # - name: "Vendor"
    #   url: null
    #   price_usd: null
    #   in_stock: true


# ── META ─────────────────────────────────────────────────────────────────────

meta:
  sources:
    - "https://example.com/datasheet"
  last_verified: "2026-04-06"
  data_completeness: partial          # full | partial | stub
  community_reviewed: false
  verified: false
  confidence:
    processing: high                  # high | medium | low
    interfaces: medium
    wireless: medium
    software: medium
    power: low
    pricing: low
